<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SE Travel Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f4fa; color: #222; min-height: 100vh; }
  .app { max-width: 960px; margin: 0 auto; padding-bottom: 60px; }

  /* Header */
  .header { background: linear-gradient(135deg, #0f2447 0%, #1a3a6e 60%, #1e4d8c 100%); border-radius: 0 0 18px 18px; padding: 28px 28px 22px; position: relative; overflow: hidden; }
  .header::before { content:''; position:absolute; right:-20px; top:-20px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.04); }
  .header::after  { content:''; position:absolute; right:60px; bottom:-40px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.03); }
  .header-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:16px; }
  .header-eyebrow { color:#7eb8f7; font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
  .header-title { color:#fff; font-size:22px; font-family:'Space Grotesk',sans-serif; font-weight:700; line-height:1.2; }
  .header-sub { color:#a0c4f0; font-size:13px; margin-top:6px; }
  .header-date-label { color:#7eb8f7; font-size:11px; font-weight:600; letter-spacing:1px; }
  .header-date { color:#fff; font-size:14px; font-weight:600; text-align:right; }
  .engr-badges { display:flex; gap:10px; flex-wrap:wrap; }
  .engr-badge { background:rgba(255,255,255,0.09); border-radius:8px; padding:6px 14px; border:1px solid rgba(255,255,255,0.12); }
  .engr-badge-name { color:#fff; font-weight:700; font-family:'Space Grotesk',sans-serif; font-size:13px; }
  .engr-badge-role { color:#a0c4f0; font-size:11px; margin-left:6px; }

  /* Tabs */
  .tabs { display:flex; background:#f0f4fa; border-bottom:1.5px solid #d8e4f5; }
  .tab-btn { background:transparent; border:none; border-bottom:2.5px solid transparent; padding:12px 22px; font-size:13px; font-weight:400; color:#555; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.15s; }
  .tab-btn:hover { background:#e8f0fe; }
  .tab-btn.active { background:#fff; border-bottom-color:#2563eb; font-weight:600; color:#2563eb; }

  /* Content */
  .content { padding:20px 4px 0; animation:fadeIn 0.25s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Role colors */
  .role-sleeping { background:#E0EEFF; color:#1a4f8a; border-color:#93bfef; }
  .role-balikan  { background:#E2F5E0; color:#1a6b29; border-color:#80cc88; }
  .role-office   { background:#FFF8E0; color:#7a5c00; border-color:#e8cc60; }
  .role-emergency{ background:#FFE8E8; color:#8a1a1a; border-color:#ef9393; }

  /* Badge */
  .badge { display:inline-block; padding:2px 10px; border-radius:20px; border:1px solid; font-size:11px; font-weight:700; letter-spacing:0.5px; font-family:'DM Sans',sans-serif; }
  .pill  { display:inline-block; padding:1px 8px; border-radius:12px; border:1px solid; font-size:10px; font-weight:600; }

  /* Engineer cards */
  .engr-cards { display:flex; gap:12px; flex-wrap:wrap; }
  .engr-card { border:1.5px solid; border-radius:10px; padding:12px 14px; flex:1; min-width:200px; }
  .engr-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .engr-card-name { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; }
  .engr-card-body { font-size:12px; line-height:1.6; }

  /* Section boxes */
  .it-box { border-radius:12px; padding:16px; margin-top:12px; border:1px solid; }
  .it-box-title { font-weight:700; font-size:13px; margin-bottom:6px; font-family:'Space Grotesk',sans-serif; }
  .it-day { padding:4px 0; font-size:13px; }
  .it-day + .it-day { border-top:1px dashed rgba(0,0,0,0.1); }

  /* Schedule table */
  .table-wrap { border-radius:12px; overflow:hidden; border:1.5px solid #d8e4f5; overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; min-width:700px; }
  thead tr { background:#1a3a6e; color:#fff; }
  th { padding:10px 10px; font-weight:600; text-align:left; font-size:11px; letter-spacing:0.3px; white-space:nowrap; }
  tbody tr { border-bottom:1px solid #e8eef8; transition:background 0.1s; }
  tbody tr:hover { background:#f4f8ff !important; }
  td { padding:8px 10px; vertical-align:middle; }
  .now-badge { font-size:10px; margin-left:4px; color:#2563eb; background:#dbeafe; border-radius:4px; padding:1px 5px; }
  .tbl-chip { font-size:10px; padding:2px 7px; border-radius:5px; font-weight:600; border:1px solid; }

  /* Davao pills */
  .davao-pills { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
  .davao-pill { background:#d4edda; color:#145a23; border:1px solid #80cc88; border-radius:12px; padding:2px 10px; font-size:11px; font-weight:600; }

  /* Emergency form */
  .form-card { background:#fff; border:1.5px solid #f0c0c0; border-radius:12px; padding:20px; margin-bottom:20px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
  .form-label { font-size:12px; font-weight:600; color:#555; display:block; margin-bottom:4px; }
  .form-input { width:100%; padding:8px 10px; border-radius:8px; border:1px solid #ddd; font-size:13px; font-family:'DM Sans',sans-serif; outline:none; transition:border 0.15s; }
  .form-input:focus { border-color:#2563eb; }
  .form-group { margin-bottom:14px; }
  .btn-emergency { background:#c0392b; color:#fff; border:none; border-radius:9px; padding:10px 22px; font-size:13px; font-weight:700; font-family:'Space Grotesk',sans-serif; cursor:pointer; display:flex; align-items:center; gap:6px; transition:opacity 0.15s; }
  .btn-emergency:hover { opacity:0.88; }
  .btn-emergency:disabled { opacity:0.6; cursor:not-allowed; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; }
  .ai-status { margin-top:10px; font-size:12px; font-weight:500; }

  /* Week nav */
  .week-nav { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
  .btn-nav { background:#e8eef8; border:none; border-radius:8px; padding:7px 16px; font-size:13px; font-weight:600; color:#334; cursor:pointer; transition:all 0.15s; }
  .btn-nav:hover { background:#d0dcf0; }
  .week-nav-center { flex:1; text-align:center; }
  .week-nav-title { font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:17px; color:#1a2a4a; }
  .week-nav-sub { font-size:12px; color:#666; margin-top:2px; }

  /* Legend */
  .legend { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
  .legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:#444; }
  .legend-dot { width:12px; height:12px; border-radius:3px; border:1px solid; }

  /* AI itinerary card */
  .ai-card { background:#fff; border:1.5px solid #d8e4f5; border-radius:12px; padding:20px; margin-bottom:16px; border-left:4px solid #c0392b; animation:fadeIn 0.3s ease; }
  .ai-card-days { background:#f8faff; border-radius:8px; padding:12px 14px; margin:10px 0; }
  .ai-day-row { padding:6px 0; border-bottom:1px dashed #e0eaff; }
  .ai-day-row:last-child { border-bottom:none; }
  .empty-state { text-align:center; padding:48px 20px; color:#aaa; background:#fafbfd; border-radius:12px; border:1.5px dashed #ddd; }

  /* Log card */
  .log-card { background:#fff; border:1px solid #f0c0c0; border-radius:10px; padding:12px 16px; margin-bottom:10px; }

  /* Section heading */
  .section-head { font-size:16px; font-weight:700; font-family:'Space Grotesk',sans-serif; color:#1a2a4a; margin:0 0 4px; }
  .section-sub  { font-size:13px; color:#666; margin:0 0 18px; }

  /* Result preview */
  .result-preview { background:#fff8f8; border:1.5px solid #f0c0c0; border-radius:12px; padding:18px; margin-bottom:20px; }

  @media (max-width: 600px) {
    .header { padding:20px 16px 16px; }
    .form-grid { grid-template-columns:1fr; }
    .engr-cards { flex-direction:column; }
    .content { padding:16px 0 0; }
    .header-top { flex-direction:column; gap:8px; }
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div style="text-align:center;padding:60px 20px;color:#888;">Loading scheduler...</div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const ENGINEERS = ["JEH","JCTT","ACC"];

const SLEEPING_ITS = [
  { id:"IT1", label:"IT1 – Gensan Area", days:[
    "Day 1: Gensan → Polomolok → Marbel",
    "Day 2: Isulan → Tacurong → Tulunan → Mlang → Kidapawan",
    "Day 3: Antipas → Kidapawan → Bansalan"
  ]},
  { id:"IT2", label:"IT2 – Digos/Kidapawan Area", days:[
    "Day 1: Digos → Bansalan → Kidapawan → Kabacan → Kidapawan",
    "Day 2: Datu Blah → Datu Odin → Libungan → Midsayap → Alamada → Davao"
  ]},
  { id:"IT3", label:"IT3 – Trento Area", days:[
    "Day 1: Trento → Montevista → Nabunturan",
    "Day 2: Nabunturan → Mawab → Tagum → Davao"
  ]},
  { id:"IT4", label:"IT4 – Mawab/Bislig Area", days:[
    "Day 1: Mawab → Rosario → San Francisco",
    "Day 2: Trento → Bislig → Tagum → Davao"
  ]}
];

const BALIKAN_ROUTES = [
  { id:"BASE IT1", label:"BASE IT1", route:"Davao → Sto. Tomas → Panabo → Davao" },
  { id:"BASE IT2", label:"BASE IT2", route:"Davao → Gov. Gen → Lupon → Maco → Davao" },
  { id:"BASE IT3", label:"BASE IT3", route:"Davao → Padada → Sulop → Davao" },
];

// 13 Davao accounts split into groups of ~3-4, rotating every Balikan week
const DAVAO_GROUPS = [
  ["Guadalupe","Divine Mercy","Malta","Unicare"],
  ["Servicare","Prinsipe","Holy Spirit"],
  ["Vital Scan","Limso","Mendrite","Dakila"],
  ["Emmanuel","MedicaRX"],
];

// Week1: JEH=Sleeping, JCTT=Balikan, ACC=Office
// Week2: JEH=Office,   JCTT=Sleeping, ACC=Balikan
// Week3: JEH=Balikan,  JCTT=Office,   ACC=Sleeping
const ROLE_CYCLES = [
  { JEH:"Sleeping", JCTT:"Balikan", ACC:"Office"   },
  { JEH:"Office",   JCTT:"Sleeping",ACC:"Balikan"  },
  { JEH:"Balikan",  JCTT:"Office",  ACC:"Sleeping" },
];

const ROLE_COLORS = {
  Sleeping:  { bg:"#E0EEFF", text:"#1a4f8a", border:"#93bfef", cls:"role-sleeping" },
  Balikan:   { bg:"#E2F5E0", text:"#1a6b29", border:"#80cc88", cls:"role-balikan"  },
  Office:    { bg:"#FFF8E0", text:"#7a5c00", border:"#e8cc60", cls:"role-office"   },
  Emergency: { bg:"#FFE8E8", text:"#8a1a1a", border:"#ef9393", cls:"role-emergency"},
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
// Every Balikan week = BASE IT route (rotating IT1→IT2→IT3) + 4 Davao accounts (rotating group)
// balikWeekCount tracks how many times Balikan has occurred so far to drive both rotations
let _balikCounter = 0; // reset each buildWeeks call

function getBalikanIT(balikWeekCount) {
  const routeIdx = balikWeekCount % BALIKAN_ROUTES.length;          // IT1, IT2, IT3, IT1...
  const groupIdx = balikWeekCount % DAVAO_GROUPS.length;            // Grp1, Grp2, Grp3, Grp4, Grp1...
  const route = BALIKAN_ROUTES[routeIdx];
  const accounts = DAVAO_GROUPS[groupIdx];
  return {
    id: route.id,
    label: `${route.label} + Davao Accounts (Grp ${groupIdx+1})`,
    route: route.route,
    routeLabel: route.label,
    accounts,
    groupIdx: groupIdx + 1,
    routeIdx: routeIdx + 1,
    isDavao: true,
  };
}

function getScheduleStartDate() {
  // Schedule starts May 5, 2026 (Tuesday) — fixed anchor date
  const d = new Date(2026, 4, 5); // Month is 0-indexed: 4 = May
  d.setHours(0,0,0,0);
  return d;
}

function getWeekDate(weekIndex, startDate) {
  const d = new Date(startDate);
  d.setDate(d.getDate() + weekIndex * 7);
  return d;
}

function fmtDate(d) {
  return d.toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"});
}

function getCurrentWeekIndex(weeks) {
  const today = new Date(); today.setHours(0,0,0,0);
  let idx = 0;
  for (let i = 0; i < weeks.length; i++) {
    const wd = new Date(weeks[i].date); wd.setHours(0,0,0,0);
    const next = i < weeks.length-1 ? new Date(weeks[i+1].date) : null;
    if (next) { next.setHours(0,0,0,0); }
    if (wd <= today && (!next || today < next)) { idx = i; break; }
    if (wd > today && i === 0) { idx = 0; break; }
    if (wd <= today) idx = i;
  }
  return idx;
}

function buildWeeks(count, startDate) {
  const weeks = [];
  let balikCount = 0;
  for (let i = 0; i < count; i++) {
    const roles = ROLE_CYCLES[i % 3];
    const sleepIT = SLEEPING_ITS[i % 4];
    const balikIT = getBalikanIT(balikCount);
    const date = getWeekDate(i, startDate);
    const assignments = {};
    ENGINEERS.forEach(eng => {
      const role = roles[eng];
      assignments[eng] = { role, it: role==="Sleeping"?sleepIT : role==="Balikan"?balikIT : null };
    });
    weeks.push({ weekNum:i+1, date, roles, sleepIT, balikIT, assignments, emergency:null });
    balikCount++; // every week has a Balikan, so counter increments every week
  }
  return weeks;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const startDate = getScheduleStartDate();
let weeks = buildWeeks(16, startDate);
let currentWeekIdx = getCurrentWeekIndex(weeks);
let activeTab = "schedule";
let emergencyLogs = [];
let generatedIts = [];
let emergencyForm = { weekNum:currentWeekIdx+1, engineer:"JEH", area:"", reason:"", loading:false, result:null };
let aiStatus = "";

// Persist emergency logs in localStorage
function saveData() {
  try {
    localStorage.setItem("se_emergency_logs", JSON.stringify(emergencyLogs));
    localStorage.setItem("se_generated_its", JSON.stringify(generatedIts));
    // Save which weeks have emergencies
    const emgMap = {};
    weeks.forEach((w,i) => { if(w.emergency) emgMap[i] = w.emergency; });
    localStorage.setItem("se_week_emergencies", JSON.stringify(emgMap));
  } catch(e) {}
}

function loadData() {
  try {
    const logs = localStorage.getItem("se_emergency_logs");
    if (logs) emergencyLogs = JSON.parse(logs);
    const its = localStorage.getItem("se_generated_its");
    if (its) generatedIts = JSON.parse(its);
    const emgMap = localStorage.getItem("se_week_emergencies");
    if (emgMap) {
      const map = JSON.parse(emgMap);
      Object.keys(map).forEach(i => { if(weeks[i]) weeks[i].emergency = map[i]; });
    }
  } catch(e) {}
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function roleBadge(role) {
  const c = ROLE_COLORS[role] || ROLE_COLORS.Office;
  return `<span class="badge" style="background:${c.bg};color:${c.text};border-color:${c.border}">${role.toUpperCase()}</span>`;
}

function engrCard(eng, assignment, emergency) {
  const isEmerg = !!emergency;
  const c = isEmerg ? ROLE_COLORS.Emergency : ROLE_COLORS[assignment.role];
  let body = "";
  if (isEmerg) {
    body = `<div style="font-weight:600;margin-bottom:2px;">⚡ Emergency Override</div>
            <div style="white-space:pre-wrap">${emergency.area}${emergency.itinerary?.notes?"\n"+emergency.itinerary.notes:""}</div>`;
  } else if (assignment.role === "Office") {
    body = `<div style="opacity:0.8">Service calls · Machine receiving · Office chores</div>`;
  } else if (assignment.role === "Sleeping") {
    const it = assignment.it;
    body = `<div style="font-weight:600;margin-bottom:4px">${it.label}</div>` +
           it.days.map(d=>`<div>• ${d}</div>`).join("");
  } else {
    const it = assignment.it;
    body = `<div style="font-weight:600;margin-bottom:6px">${it.routeLabel}</div>`;
    body += `<div style="margin-bottom:6px">• ${it.route}</div>`;
    body += `<div style="font-size:11px;opacity:0.75;margin-bottom:4px;margin-top:8px;border-top:1px dashed rgba(0,0,0,0.1);padding-top:6px">+ Davao accounts this week:</div>`;
    body += `<div class="davao-pills">${it.accounts.map(a=>`<span class="davao-pill">${a}</span>`).join("")}</div>`;
  }
  return `<div class="engr-card" style="border-color:${c.border};background:${c.bg}">
    <div class="engr-card-header">
      <span class="engr-card-name" style="color:${c.text}">${eng}</span>
      ${roleBadge(isEmerg?"Emergency":assignment.role)}
    </div>
    <div class="engr-card-body" style="color:${c.text}">${body}</div>
  </div>`;
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function renderHeader() {
  const w1roles = ROLE_CYCLES[0];
  return `<div class="header">
    <div class="header-top">
      <div>
        <div class="header-eyebrow">Field Operations</div>
        <div class="header-title">SE Travel Scheduler</div>
        <div class="header-sub">Auto-rotating schedule · Starts every Tuesday · AI-powered emergency itineraries</div>
      </div>
      <div>
        <div class="header-date-label">STARTS MAY 5, 2026</div>
        <div class="header-date">${fmtDate(startDate)}</div>
      </div>
    </div>
    <div class="engr-badges">
      ${ENGINEERS.map(e=>`<div class="engr-badge">
        <span class="engr-badge-name">${e}</span>
        <span class="engr-badge-role">${w1roles[e]} (Wk 1)</span>
      </div>`).join("")}
    </div>
  </div>`;
}

function renderTabs() {
  const tabs = [
    {id:"schedule",label:"Schedule"},
    {id:"current",label:"This Week"},
    {id:"emergency",label:`Emergency${emergencyLogs.length>0?" ("+emergencyLogs.length+")":""}`},
    {id:"ai_its",label:"AI Itineraries"},
  ];
  return `<div class="tabs">${tabs.map(t=>`<button class="tab-btn${activeTab===t.id?" active":""}" onclick="switchTab('${t.id}')">${t.label}</button>`).join("")}</div>`;
}

function renderScheduleTab() {
  const legend = Object.entries(ROLE_COLORS).filter(([k])=>k!=="Emergency")
    .map(([role,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c.bg};border-color:${c.border}"></div>${role}</div>`).join("");

  const rows = weeks.map((w,i)=>{
    const isCur = i===currentWeekIdx;
    const haEmerg = !!w.emergency;
    const bg = isCur?"#eff6ff": i%2===0?"#fafbfd":"#fff";
    const cells = ENGINEERS.map(eng=>{
      const a = w.assignments[eng];
      const isEmg = haEmerg && w.emergency.engineer===eng;
      const c = isEmg?ROLE_COLORS.Emergency:ROLE_COLORS[a.role];
      return `<td><span class="tbl-chip" style="background:${c.bg};color:${c.text};border-color:${c.border}">${isEmg?"EMERG":a.role.slice(0,5).toUpperCase()}</span></td>`;
    }).join("");
    const emgCell = haEmerg
      ? `<td><span class="tbl-chip" style="background:#ffe8e8;color:#8a1a1a;border-color:#ef9393">⚡ ${w.emergency.engineer} → ${w.emergency.area}</span></td>`
      : `<td style="color:#bbb;font-size:11px">—</td>`;
    const balikLabel = `${w.balikIT.id}+G${w.balikIT.groupIdx}`;
    return `<tr style="background:${bg}">
      <td style="font-weight:${isCur?700:500};color:${isCur?"#1a4f8a":"#333"}">${w.weekNum}${isCur?'<span class="now-badge">NOW</span>':""}</td>
      <td style="color:#444">${fmtDate(w.date)}</td>
      <td><span class="tbl-chip role-sleeping">${w.sleepIT.id}</span></td>
      <td><span class="tbl-chip role-balikan" style="font-size:10px">${balikLabel}</span></td>
      ${cells}${emgCell}
    </tr>`;
  }).join("");

  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <h2 class="section-head" style="color:#1a2a4a">16-Week Rolling Schedule</h2>
      <span style="font-size:12px;color:#666">Role cycle: 3 wks · IT cycle: 4 wks</span>
    </div>
    <div class="legend">${legend}</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Wk</th><th>Date (Tue)</th><th>Sleep IT</th><th>Balik IT</th>
          <th>JEH</th><th>JCTT</th><th>ACC</th><th>Emergency</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function renderCurrentTab() {
  const w = weeks[currentWeekIdx];
  const cards = ENGINEERS.map(eng=>{
    const isEmg = w.emergency?.engineer===eng;
    return engrCard(eng, w.assignments[eng], isEmg?w.emergency:null);
  }).join("");

  const pills = w.balikIT.accounts.map(a=>`<span class="davao-pill">${a}</span>`).join("");
  balikBox = `<div class="it-box" style="background:#f0faf2;border-color:#b8e0bf">
    <div class="it-box-title" style="color:#1a6b29">Balikan – ${w.balikIT.routeLabel}</div>
    <div style="font-size:13px;color:#1a6b29;margin-bottom:12px">• ${w.balikIT.route}</div>
    <div style="font-size:12px;font-weight:600;color:#1a6b29;margin-bottom:6px;padding-top:10px;border-top:1px dashed #b8e0bf">
      + Davao Accounts to service this week <span style="font-weight:400;opacity:0.7">(Group ${w.balikIT.groupIdx})</span>
    </div>
    <div class="davao-pills">${pills}</div>
    <div style="font-size:11px;color:#888;margin-top:10px">
      Davao group ${w.balikIT.groupIdx} of ${DAVAO_GROUPS.length} &nbsp;·&nbsp; All 13 accounts covered across every 4 Balikan weeks
    </div>
  </div>`;

  const sleepDays = w.sleepIT.days.map((d,i,arr)=>`<div class="it-day" style="color:#1a4f8a;${i<arr.length-1?"border-bottom:1px dashed #b8d4ef":""}">${d}</div>`).join("");

  return `<div>
    <div class="week-nav">
      <button class="btn-nav" onclick="changeWeek(-1)">← Prev</button>
      <div class="week-nav-center">
        <div class="week-nav-title">Week ${w.weekNum} — ${fmtDate(w.date)}</div>
        <div class="week-nav-sub">Cycle ${(currentWeekIdx%3)+1} of 3 &nbsp;·&nbsp; Sleep: ${w.sleepIT.id} &nbsp;·&nbsp; Balik: ${w.balikIT.id} + Davao Grp ${w.balikIT.groupIdx}</div>
      </div>
      <button class="btn-nav" onclick="changeWeek(1)">Next →</button>
    </div>
    <div class="engr-cards">${cards}</div>
    <div class="it-box" style="background:#f0f6ff;border-color:#c8dcf5">
      <div class="it-box-title" style="color:#1a4f8a">Sleeping Itinerary – ${w.sleepIT.label}</div>
      ${sleepDays}
    </div>
    ${balikBox}
  </div>`;
}

function renderEmergencyTab() {
  const wkOptions = weeks.map(w=>`<option value="${w.weekNum}"${emergencyForm.weekNum===w.weekNum?" selected":""}>Week ${w.weekNum} — ${fmtDate(w.date)}</option>`).join("");
  const engOptions = ENGINEERS.map(e=>`<option value="${e}"${emergencyForm.engineer===e?" selected":""}>${e}</option>`).join("");

  let resultHTML = "";
  if (emergencyForm.result) {
    const r = emergencyForm.result;
    const days = (r.days||[]).map(d=>`<div style="margin-bottom:8px">
      <span style="font-weight:600;color:#555;font-size:12px">Day ${d.day}: </span>
      <span style="font-size:13px;color:#333">${Array.isArray(d.stops)?d.stops.join(" → "):d.stops}</span>
      ${d.overnight?`<span style="font-size:11px;color:#888;margin-left:6px">(overnight: ${d.overnight})</span>`:""}
    </div>`).join("");
    resultHTML = `<div class="result-preview">
      <div style="font-weight:700;font-family:'Space Grotesk',sans-serif;color:#8a1a1a;font-size:14px;margin-bottom:10px">⚡ ${r.title||"Emergency Itinerary"}</div>
      ${days}
      ${r.return?`<div style="font-size:12px;color:#555;margin-top:6px">Return: ${r.return}</div>`:""}
      ${r.notes?`<div style="font-size:12px;color:#666;margin-top:8px;padding:8px 10px;background:#fff0f0;border-radius:7px">${r.notes}</div>`:""}
    </div>`;
  }

  const logCards = emergencyLogs.map(log=>{
    const days = log.itinerary?.days?.map(d=>`<div style="font-size:12px;color:#444">Day ${d.day}: ${Array.isArray(d.stops)?d.stops.join(" → "):d.stops}</div>`).join("")||"";
    return `<div class="log-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <span style="font-weight:700;color:#8a1a1a;font-family:'Space Grotesk',sans-serif">${log.engineer}</span>
          <span style="color:#666;font-size:12px;margin-left:8px">Week ${log.weekNum} · ${log.weekDate}</span>
        </div>
        <span class="badge role-emergency">EMERGENCY</span>
      </div>
      <div style="font-size:13px;color:#333;margin-top:4px">📍 ${log.area}</div>
      ${log.reason?`<div style="font-size:12px;color:#666;margin-top:2px">Reason: ${log.reason}</div>`:""}
      ${days?`<div style="margin-top:8px">${days}</div>`:""}
    </div>`;
  }).join("");

  const statusColor = emergencyForm.loading?"#888":"#1a6b29";

  return `<div>
    <h2 class="section-head" style="color:#8a1a1a">Emergency Travel</h2>
    <p class="section-sub">Log an unplanned field trip. AI will generate an optimized itinerary and save it to the AI Itineraries tab.</p>
    <div class="form-card">
      <div class="form-grid">
        <div>
          <label class="form-label">Week Number</label>
          <select class="form-input" id="emg-week" onchange="updateForm('weekNum',+this.value)">${wkOptions}</select>
        </div>
        <div>
          <label class="form-label">Engineer</label>
          <select class="form-input" id="emg-eng" onchange="updateForm('engineer',this.value)">${engOptions}</select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Emergency Destination / Area *</label>
        <input class="form-input" id="emg-area" value="${emergencyForm.area}" placeholder="e.g. Cotabato City, Maguindanao" oninput="updateForm('area',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">Reason / Notes</label>
        <input class="form-input" id="emg-reason" value="${emergencyForm.reason}" placeholder="e.g. Urgent equipment breakdown at client site" oninput="updateForm('reason',this.value)">
      </div>
      <button class="btn-emergency" id="emg-btn" onclick="generateEmergency()" ${emergencyForm.loading?"disabled":""}>
        ${emergencyForm.loading?'<span class="spinner"></span>Generating...':'⚡ Generate Emergency Itinerary'}
      </button>
      ${aiStatus?`<div class="ai-status" style="color:${statusColor}">${aiStatus}</div>`:""}
    </div>
    ${resultHTML}
    ${emergencyLogs.length>0?`<div>
      <h3 style="font-size:14px;font-weight:700;color:#333;margin:0 0 10px;font-family:'Space Grotesk',sans-serif">Emergency Log</h3>
      ${logCards}
    </div>`:""}
  </div>`;
}

function renderAiTab() {
  if (generatedIts.length === 0) {
    return `<div>
      <h2 class="section-head">AI-Generated Itineraries</h2>
      <p class="section-sub">All emergency itineraries generated by AI are saved here automatically.</p>
      <div class="empty-state">
        <div style="font-size:32px;margin-bottom:8px">🗺️</div>
        <div style="font-size:14px;font-weight:500">No AI itineraries yet</div>
        <div style="font-size:12px;margin-top:4px">Use the Emergency tab to generate your first one</div>
      </div>
    </div>`;
  }
  const cards = generatedIts.map(log=>{
    const r = log.itinerary;
    const days = (r.days||[]).map((d,i,arr)=>`<div class="ai-day-row" style="${i===arr.length-1?'border:none':''}">
      <span style="font-weight:600;color:#2563eb;font-size:12px;margin-right:6px">Day ${d.day}</span>
      <span style="font-size:13px;color:#334">${Array.isArray(d.stops)?d.stops.join(" → "):d.stops}</span>
      ${d.overnight?`<span style="font-size:11px;color:#888;margin-left:8px;background:#e8f0fe;padding:1px 7px;border-radius:5px">Overnight: ${d.overnight}</span>`:""}
    </div>`).join("");
    return `<div class="ai-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
        <div>
          <div style="font-weight:700;font-family:'Space Grotesk',sans-serif;font-size:15px;color:#1a2a4a">${r.title||"Emergency Itinerary"}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">${log.engineer} · Week ${log.weekNum} · ${log.weekDate}</div>
        </div>
        <div style="font-size:11px;background:#ffe8e8;color:#8a1a1a;padding:2px 10px;border-radius:6px;font-weight:700">${r.estimatedDays||1} DAY${(r.estimatedDays||1)>1?"S":""}</div>
      </div>
      <div class="ai-card-days">${days}${r.return?`<div style="padding-top:6px;font-size:12px;color:#555"><strong>Return:</strong> ${r.return}</div>`:""}</div>
      ${r.notes?`<div style="font-size:12px;color:#555;padding:8px 12px;background:#fffbf0;border-radius:7px;border:1px solid #fde8b0">💡 ${r.notes}</div>`:""}
      <div style="margin-top:10px;font-size:11px;color:#aaa">Area: ${log.area} · Reason: ${log.reason||"—"}</div>
    </div>`;
  }).join("");
  return `<div>
    <h2 class="section-head">AI-Generated Itineraries</h2>
    <p class="section-sub">Saved automatically each time an emergency itinerary is generated.</p>
    ${cards}
  </div>`;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  let content = "";
  if (activeTab==="schedule")  content = renderScheduleTab();
  else if (activeTab==="current")  content = renderCurrentTab();
  else if (activeTab==="emergency") content = renderEmergencyTab();
  else content = renderAiTab();

  document.getElementById("app").innerHTML =
    renderHeader() +
    renderTabs() +
    `<div class="content">${content}</div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function switchTab(tab) { activeTab = tab; render(); }

function changeWeek(dir) {
  currentWeekIdx = Math.max(0, Math.min(weeks.length-1, currentWeekIdx+dir));
  render();
}

function updateForm(field, val) {
  emergencyForm[field] = val;
}

async function generateEmergency() {
  const { weekNum, engineer, area, reason } = emergencyForm;
  if (!area.trim()) { aiStatus = "⚠️ Please enter the emergency area/destination."; render(); return; }

  emergencyForm.loading = true;
  emergencyForm.result = null;
  aiStatus = "AI is generating emergency itinerary...";
  render();

  try {
    const week = weeks[weekNum-1];
    const engRole = week.assignments[engineer].role;
    const res = await fetch("/.netlify/functions/ai-itinerary", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ engineer, area, reason, engRole, weekNum, weekDate: fmtDate(week.date) })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || "Function error " + res.status);
    }
    const parsed = await res.json();

    const log = { id:Date.now(), weekNum, engineer, area, reason, itinerary:parsed, date:new Date().toISOString(), weekDate:fmtDate(week.date) };
    emergencyLogs.unshift(log);
    generatedIts.unshift(log);
    weeks[weekNum-1].emergency = { engineer, area, itinerary:parsed };
    emergencyForm.loading = false;
    emergencyForm.result = parsed;
    aiStatus = "✅ Emergency itinerary generated and saved!";
    saveData();
  } catch(e) {
    emergencyForm.loading = false;
    aiStatus = "❌ Error generating itinerary. aiStatus = "❌ Error: " + (e.message || "Unknown error");.";
  }
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadData();
render();

// Auto-refresh: check every hour if day changed (for "NOW" badge accuracy)
setInterval(() => {
  const newIdx = getCurrentWeekIndex(weeks);
  if (newIdx !== currentWeekIdx && activeTab !== "current") {
    currentWeekIdx = newIdx;
    render();
  }
}, 3600000);
</script>
</body>
</html>
